<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Prova Paulista - Mogi das Cruzes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo } = React;

    // ----- DADOS E CONFIGURAÇÕES -----
    const schoolsData = [
      {"name": "ADELAIDE MARIA DE BARROS PROFESSORA - 924830", "metrics": {"participacao": {"2025": 98.08, "2026": 97.74}, "acertos": {"2025": 58.25, "2026": 57.74}}, "subjects": {"PORT": {"2025": 59.67, "2026": 62.7}, "MAT": {"2025": 55.26, "2026": 50.41}, "HIS": {"2025": 47.99, "2026": 59.69}, "GEO": {"2025": 54.12, "2026": 61.13}, "BIO": {"2025": 79.11, "2026": 54.81}, "QUI": {"2025": 70.89, "2026": 51.85}, "ING": {"2025": 62.15, "2026": 65.68}, "CIE": {"2025": 57.25, "2026": 53.56}, "FIS": {"2025": 73.94, "2026": 40.22}}}, 
      {"name": "ADHEMAR BOLINA PROFESSOR - 6592", "metrics": {"participacao": {"2025": 93.34, "2026": 97.29}, "acertos": {"2025": 35.34, "2026": 42.5}}, "subjects": {"PORT": {"2025": 38.96, "2026": 50.39}, "MAT": {"2025": 31.67, "2026": 34.92}, "HIS": {"2025": 32.38, "2026": 42.04}, "GEO": {"2025": 38.4, "2026": 46.18}, "BIO": {"2025": 38.98, "2026": 34.43}, "QUI": {"2025": 33.61, "2026": 30.28}, "ING": {"2025": 39.38, "2026": 46.72}, "CIE": {"2025": 37.26, "2026": 42.17}, "FIS": {"2025": 31.69, "2026": 29.1}}},
      // ... (Adicione aqui as demais escolas do seu arquivo original seguindo este padrão)
    ];

    const networkData = { participacao: { "2025": 92.1, "2026": 93.9 }, acertos: { "2025": 46.1, "2026": 50.0 } };
    const subjectNames = { "PORT": "Língua Portuguesa", "MAT": "Matemática", "HIS": "História", "GEO": "Geografia", "BIO": "Biologia", "QUI": "Química", "ING": "Inglês", "CIE": "Ciências", "FIS": "Física" };

    function App() {
      const [selectedSchool, setSelectedSchool] = useState(null);

      return (
        <div className="min-h-screen bg-gray-50 p-6">
          <header className="max-w-6xl mx-auto mb-8">
            <h1 className="text-3xl font-bold text-blue-900">Painel Prova Paulista - Mogi das Cruzes</h1>
            <p className="text-gray-600">Comparativo 2025 vs 2026</p>
          </header>

          <main className="max-w-6xl mx-auto">
            {!selectedSchool && (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div className="bg-white p-6 rounded-xl shadow border">
                  <h2 className="text-gray-500 font-bold uppercase text-sm">Média Geral Participação</h2>
                  <p className="text-3xl font-bold">{networkData.participacao["2026"]}%</p>
                </div>
                <div className="bg-white p-6 rounded-xl shadow border">
                  <h2 className="text-gray-500 font-bold uppercase text-sm">Média Geral Acertos</h2>
                  <p className="text-3xl font-bold">{networkData.acertos["2026"]}%</p>
                </div>
              </div>
            )}

            <select 
              className="w-full p-4 mb-8 rounded-lg border shadow-sm"
              onChange={(e) => setSelectedSchool(schoolsData.find(s => s.name === e.target.value))}
            >
              <option value="">Selecione uma escola para ver detalhes...</option>
              {schoolsData.map((s, i) => <option key={i} value={s.name}>{s.name}</option>)}
            </select>

            {selectedSchool && (
              <div className="bg-white p-8 rounded-xl shadow-lg">
                <h2 className="text-2xl font-bold mb-4">{selectedSchool.name}</h2>
                <div className="grid grid-cols-2 gap-6">
                  <div className="p-4 bg-blue-50 rounded">
                    <p className="text-sm text-blue-600 font-bold">Participação 2026</p>
                    <p className="text-2xl font-bold">{selectedSchool.metrics.participacao["2026"]}%</p>
                  </div>
                  <div className="p-4 bg-green-50 rounded">
                    <p className="text-sm text-green-600 font-bold">Acertos 2026</p>
                    <p className="text-2xl font-bold">{selectedSchool.metrics.acertos["2026"]}%</p>
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
