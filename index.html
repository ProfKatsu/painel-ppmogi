<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Prova Paulista</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold mb-6 text-blue-900">Painel Prova Paulista - Mogi das Cruzes</h1>
    
    <select id="schoolSelect" class="w-full p-3 border rounded-lg shadow-sm mb-6 bg-white">
      <option value="">Selecione uma escola...</option>
    </select>

    <div id="displayArea" class="bg-white p-6 rounded-xl shadow-lg border border-blue-100 hidden">
      <h2 id="schoolName" class="text-lg font-bold text-blue-800 mb-4"></h2>
      <div class="grid grid-cols-2 gap-4">
        <div class="p-4 bg-blue-50 rounded-lg">
          <p class="text-xs text-blue-600 uppercase font-bold">Participação 2026</p>
          <p id="partValue" class="text-2xl font-bold"></p>
        </div>
        <div class="p-4 bg-green-50 rounded-lg">
          <p class="text-xs text-green-600 uppercase font-bold">Acertos 2026</p>
          <p id="acertosValue" class="text-2xl font-bold"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const schoolsData = [
      {"name": "ADELAIDE MARIA DE BARROS PROFESSORA", "part": 97.74, "acertos": 57.74},
      {"name": "ADHEMAR BOLINA PROFESSOR", "part": 97.29, "acertos": 42.5},
      {"name": "ALCIDES CELESTINO FILHO VEREADOR", "part": 98.2, "acertos": 58.64},
      {"name": "WASHINGTON LUIZ DOUTOR", "part": 97.57, "acertos": 57.15}
      // Adicione aqui o restante das suas escolas no mesmo formato {"name": "...", "part": 0, "acertos": 0},
    ];

    const select = document.getElementById('schoolSelect');
    const displayArea = document.getElementById('displayArea');

    // Preencher select
    schoolsData.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.name;
      opt.textContent = s.name;
      select.appendChild(opt);
    });

    // Evento de seleção
    select.addEventListener('change', (e) => {
      const school = schoolsData.find(s => s.name === e.target.value);
      if (school) {
        document.getElementById('schoolName').textContent = school.name;
        document.getElementById('partValue').textContent = school.part + '%';
        document.getElementById('acertosValue').textContent = school.acertos + '%';
        displayArea.classList.remove('hidden');
      } else {
        displayArea.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
